<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 반려동물 동반 업소 검색</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --card:#21253a;
    --accent:#7fffb2; --accent2:#38bdf8;
    --text:#e8eaf0; --muted:#6b7280; --border:#2d3148;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}

  header{padding:22px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;}
  .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(127,255,178,.25);}
  .logo-title{font-size:17px;font-weight:700;letter-spacing:-.4px;}
  .logo-sub{font-size:11px;color:var(--muted);margin-top:2px;}

  main{max-width:1200px;margin:0 auto;padding:28px 32px;}

  .stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
  .stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:7px 16px;font-size:13px;display:flex;align-items:center;gap:8px;color:var(--muted);}
  .stat-pill strong{color:var(--accent);font-size:15px;}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:blink 2s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  .filter-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:20px;}
  .filter-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
  .fg{display:flex;flex-direction:column;gap:6px;flex:1;min-width:150px;}
  .fg label{font-size:11px;color:var(--muted);letter-spacing:.7px;text-transform:uppercase;font-weight:600;}
  .fg input,.fg select{background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:14px;font-family:inherit;padding:10px 14px;outline:none;transition:border-color .2s;}
  .fg input:focus,.fg select:focus{border-color:var(--accent);}
  .fg select option{background:var(--card);}

  .pet-wrap{display:flex;flex-direction:column;gap:6px;}
  .pet-wrap label{font-size:11px;color:var(--muted);letter-spacing:.7px;text-transform:uppercase;font-weight:600;}
  .toggle-row{display:flex;gap:6px;height:42px;align-items:center;}
  .tbtn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .tbtn.active{background:rgba(127,255,178,.12);border-color:var(--accent);color:var(--accent);font-weight:600;}

  .btn-search{padding:0 24px;height:42px;background:var(--accent);color:#0f1117;border:none;border-radius:9px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;box-shadow:0 0 20px rgba(127,255,178,.25);transition:all .15s;display:flex;align-items:center;gap:6px;}
  .btn-search:hover{transform:translateY(-1px);box-shadow:0 0 28px rgba(127,255,178,.4);}
  .btn-search:disabled{opacity:.5;cursor:not-allowed;transform:none;}

  .results-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
  .results-count{font-size:13px;color:var(--muted);}
  .results-count strong{color:var(--text);}
  .page-ctrl{display:flex;gap:10px;align-items:center;font-size:13px;color:var(--muted);}
  .btn-page{padding:5px 12px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:7px;font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit;}
  .btn-page:hover:not(:disabled){border-color:var(--accent2);color:var(--accent2);}
  .btn-page:disabled{opacity:.3;cursor:not-allowed;}

  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead tr{background:var(--card);border-bottom:1px solid var(--border);}
  th{padding:13px 16px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
  tbody tr{border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:rgba(127,255,178,.04);}
  td{padding:12px 16px;}

  .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
  .badge-pet{background:rgba(127,255,178,.12);color:var(--accent);border:1px solid rgba(127,255,178,.25);}
  .badge-nopet{background:rgba(107,114,128,.1);color:var(--muted);border:1px solid rgba(107,114,128,.2);}
  .badge-type{background:rgba(56,189,248,.1);color:var(--accent2);border:1px solid rgba(56,189,248,.2);}

  .state-box{padding:60px 20px;text-align:center;color:var(--muted);}
  .state-box .icon{font-size:44px;margin-bottom:14px;}
  .state-box p{font-size:15px;margin-bottom:6px;}
  .state-box small{font-size:12px;opacity:.6;}

  .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
  .modal-bg.open{opacity:1;pointer-events:all;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;max-width:520px;padding:28px;max-height:88vh;overflow-y:auto;transform:translateY(16px);transition:transform .2s;}
  .modal-bg.open .modal{transform:translateY(0);}
  .modal-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:20px;}
  .modal-title{font-size:18px;font-weight:700;line-height:1.3;}
  .modal-close{background:var(--card);border:none;color:var(--muted);width:30px;height:30px;border-radius:8px;font-size:14px;cursor:pointer;flex-shrink:0;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .detail-item{background:var(--card);border-radius:10px;padding:12px 14px;}
  .detail-item.full{grid-column:1/-1;}
  .detail-label{font-size:10px;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;font-weight:600;margin-bottom:5px;}
  .detail-value{font-size:14px;color:var(--text);line-height:1.5;}
  .detail-value.hi{color:var(--accent);font-weight:700;font-size:15px;}

  @media(max-width:640px){
    main{padding:20px;}
    header{padding:18px 20px;}
    th:nth-child(3),td:nth-child(3),th:nth-child(5),td:nth-child(5){display:none;}
    .detail-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<header>
  <div class="logo-icon">🐾</div>
  <div>
    <div class="logo-title">반려동물 동반 업소 검색</div>
    <div class="logo-sub">식품안전나라 I1200 공공데이터</div>
  </div>
</header>

<main>
  <div class="stats">
    <div class="stat-pill"><div class="live-dot"></div>총 결과 <strong id="sTotal">—</strong>건</div>
    <div class="stat-pill">🐾 반려동물 가능 <strong id="sPet">—</strong>건</div>
    <div class="stat-pill">📄 페이지 <strong id="sPage">—</strong></div>
  </div>

  <div class="filter-panel">
    <div class="filter-row">
      <div class="fg" style="flex:2;min-width:200px;">
        <label>업소명 / 주소</label>
        <input type="text" id="kw" placeholder="예: 강남, 카페...">
      </div>
      <div class="fg">
        <label>시도</label>
        <select id="city">
          <option value="">전체</option>
          <option>서울특별시</option><option>부산광역시</option><option>대구광역시</option>
          <option>인천광역시</option><option>광주광역시</option><option>대전광역시</option>
          <option>울산광역시</option><option>세종특별자치시</option><option>경기도</option>
          <option>강원특별자치도</option><option>충청북도</option><option>충청남도</option>
          <option>전북특별자치도</option><option>전라남도</option><option>경상북도</option>
          <option>경상남도</option><option>제주특별자치도</option>
        </select>
      </div>
      <div class="fg">
        <label>업종</label>
        <select id="biz">
          <option value="">전체</option>
          <option>일반음식점</option><option>휴게음식점</option>
          <option>제과점영업</option><option>단란주점영업</option>
        </select>
      </div>
      <div class="pet-wrap">
        <label>반려동물 출입</label>
        <div class="toggle-row">
          <button class="tbtn" data-v="" onclick="setPet(this)">전체</button>
          <button class="tbtn active" data-v="Y" onclick="setPet(this)">🐾 가능</button>
          <button class="tbtn" data-v="N" onclick="setPet(this)">✕ 불가</button>
        </div>
      </div>
      <button class="btn-search" id="btnSearch" onclick="search(1)">🔍 검색</button>
    </div>
  </div>

  <div class="results-bar">
    <div class="results-count" id="rcCount"></div>
    <div class="page-ctrl">
      <button class="btn-page" id="btnPrev" onclick="changePage(-1)" disabled>← 이전</button>
      <span id="pageText">—</span>
      <button class="btn-page" id="btnNext" onclick="changePage(1)" disabled>다음 →</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>업소명</th><th>업종</th><th>주소</th><th>반려동물</th><th>인허가일</th></tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5">
          <div class="state-box"><div class="spinner"></div><p>데이터를 불러오는 중...</p></div>
        </td></tr>
      </tbody>
    </table>
  </div>
</main>

<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="detail-grid" id="modalBody"></div>
  </div>
</div>

<script>
  const PAGE_SIZE = 20;
  let petVal='Y', curPage=1, totalCount=0, lastP=null;

  function setPet(btn){
    document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    petVal=btn.dataset.v;
  }
  function fmt(d){return d?d.replace(/(\d{4})(\d{2})(\d{2})/,'$1.$2.$3'):'—';}
  function setLoading(){
    document.getElementById('tbody').innerHTML=`<tr><td colspan="5"><div class="state-box"><div class="spinner"></div><p>데이터를 불러오는 중...</p></div></td></tr>`;
  }

  async function search(page){
    const kw=document.getElementById('kw').value.trim();
    const city=document.getElementById('city').value;
    const biz=document.getElementById('biz').value;
    lastP={kw,city,biz};
    curPage=page;
    await fetchData(kw,city,biz,page);
  }

  async function changePage(dir){
    if(!lastP)return;
    const max=Math.ceil(totalCount/PAGE_SIZE);
    const next=curPage+dir;
    if(next<1||next>max)return;
    curPage=next;
    await fetchData(lastP.kw,lastP.city,lastP.biz,curPage);
  }

  async function fetchData(kw,city,biz,page){
    setLoading();
    document.getElementById('btnSearch').disabled=true;
    const p=new URLSearchParams({page});
    if(kw)    p.append('keyword',kw);
    if(city)  p.append('city',city);
    if(biz)   p.append('biz',biz);
    if(petVal)p.append('pet',petVal);

    try{
      // 같은 도메인의 Vercel Serverless Function 호출
      const res=await fetch(`/api/restaurants?${p}`);
      if(!res.ok){const e=await res.json();throw new Error(e.error||res.statusText);}
      const {total,rows}=await res.json();
      totalCount=total;
      renderTable(rows);
      updateMeta(rows,page);
    }catch(e){
      document.getElementById('tbody').innerHTML=`
        <tr><td colspan="5"><div class="state-box">
          <div class="icon">⚠️</div><p>${e.message}</p>
          <small>Vercel 배포 후 정상 작동합니다</small>
        </div></td></tr>`;
    }finally{
      document.getElementById('btnSearch').disabled=false;
    }
  }

  function renderTable(rows){
    if(!rows.length){
      document.getElementById('tbody').innerHTML=`<tr><td colspan="5"><div class="state-box"><div class="icon">🐾</div><p>검색 결과가 없습니다</p></div></td></tr>`;
      return;
    }
    document.getElementById('tbody').innerHTML=rows.map(r=>{
      const pet=(r.PET_MNGT_YN||'').toUpperCase();
      const petBadge=pet==='Y'?`<span class="badge badge-pet">🐾 가능</span>`:pet==='N'?`<span class="badge badge-nopet">✕ 불가</span>`:`<span style="color:var(--muted);font-size:12px">—</span>`;
      return `<tr onclick='openModal(${JSON.stringify(JSON.stringify(r))})'>
        <td style="font-weight:500">${r.BSNS_SITE_NM||'—'}</td>
        <td><span class="badge badge-type">${r.BSNS_SITE_CLSFC_NM||'—'}</span></td>
        <td style="color:var(--muted);font-size:12px">${r.SITE_ADDR_RD||r.SITE_ADDR||'—'}</td>
        <td>${petBadge}</td>
        <td style="color:var(--muted);font-size:12px">${fmt(r.LCNS_DE)}</td>
      </tr>`;
    }).join('');
  }

  function updateMeta(rows,page){
    const max=Math.ceil(totalCount/PAGE_SIZE)||1;
    const petCnt=rows.filter(r=>(r.PET_MNGT_YN||'').toUpperCase()==='Y').length;
    document.getElementById('sTotal').textContent=totalCount.toLocaleString();
    document.getElementById('sPet').textContent=petCnt;
    document.getElementById('sPage').textContent=`${page} / ${max}`;
    document.getElementById('pageText').textContent=`${page} / ${max}`;
    document.getElementById('rcCount').innerHTML=`총 <strong>${totalCount.toLocaleString()}</strong>건 · 이 페이지 <strong>${rows.length}</strong>건`;
    document.getElementById('btnPrev').disabled=page<=1;
    document.getElementById('btnNext').disabled=page>=max;
  }

  function openModal(jsonStr){
    const r=JSON.parse(jsonStr);
    const pet=(r.PET_MNGT_YN||'').toUpperCase();
    document.getElementById('modalTitle').textContent=r.BSNS_SITE_NM||'업소 상세정보';
    document.getElementById('modalBody').innerHTML=[
      {l:'반려동물 출입',v:pet==='Y'?'🐾 출입 가능':pet==='N'?'✕ 출입 불가':'정보 없음',hi:pet==='Y'},
      {l:'업종',v:r.BSNS_SITE_CLSFC_NM||'—'},
      {l:'도로명주소',v:r.SITE_ADDR_RD||'—',full:true},
      {l:'지번주소',v:r.SITE_ADDR||'—',full:true},
      {l:'인허가일',v:fmt(r.LCNS_DE)},
      {l:'영업상태',v:r.BSNS_STATE_NM||'—'},
      {l:'위생업태명',v:r.SANITTN_BIZCOND_NM||'—'},
      {l:'전화번호',v:r.SITE_TEL||'—'},
    ].map(f=>`<div class="detail-item${f.full?' full':''}">
      <div class="detail-label">${f.l}</div>
      <div class="detail-value${f.hi?' hi':''}">${f.v}</div>
    </div>`).join('');
    document.getElementById('modalBg').classList.add('open');
  }

  function closeModal(e){
    if(!e||e.target===document.getElementById('modalBg')){
      document.getElementById('modalBg').classList.remove('open');
    }
  }

  document.getElementById('kw').addEventListener('keydown',e=>{if(e.key==='Enter')search(1);});
  search(1);
</script>
</body>
</html>
